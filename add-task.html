<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Task – TaskFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a href="index.html">Dashboard</a>
    <a href="add-task.html">Add Task</a>
    <a href="task-list.html">Task List</a>
    <a href="task-detail.html">Task Detail</a>
    <a href="about.html">About</a>
  </nav>

  <div class="container">
    <h1>Add New Task</h1>

    <form>
      <div style="margin-bottom: 15px;">
        <label style="display:block; margin-bottom:5px; font-weight:bold;">Task Title</label>
        <input type="text" name="title" placeholder="Enter task title" required
          style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;" />
      </div>

      <div style="margin-bottom: 15px;">
        <label style="display:block; margin-bottom:5px; font-weight:bold;">Description</label>
        <textarea name="description" rows="4" placeholder="Enter task description"
          style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;"></textarea>
      </div>

      <div style="margin-bottom: 15px;">
        <label style="display:block; margin-bottom:5px; font-weight:bold;">Due Date</label>
        <input type="date" name="due-date" required
          style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;" />
      </div>

      <div style="margin-bottom: 20px;">
        <label style="display:block; margin-bottom:5px; font-weight:bold;">Priority</label>
        <select name="priority"
          style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>

      <button type="submit" class="btn">Add Task</button>
    </form>
  </div>

</body>
</html>
