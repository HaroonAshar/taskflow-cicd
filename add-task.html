<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a new task in TaskFlow.">
  <title>TaskFlow — Add Task</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="index.html"><span class="logo">✓</span> Task<span><b>Flow</b></span></a>
    <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="task-list.html">Tasks</a>
      <a href="add-task.html">Add Task</a>
      <a href="about.html">About</a>
      <button class="theme-toggle" aria-label="Toggle theme">🌙</button>
    </div>
  </nav>

  <div class="container">
    <div class="page-head">
      <div class="eyebrow">Create</div>
      <h1>Add a New Task</h1>
      <p>Fill in the details below. New tasks appear instantly on your dashboard and task list.</p>
    </div>

    <div class="card" style="max-width:760px">
      <form id="task-form" novalidate>
        <div class="form-grid">
          <div class="field full">
            <label for="title">Title <span class="muted">*</span></label>
            <input id="title" name="title" type="text" placeholder="e.g. Prepare release notes" required>
          </div>
          <div class="field">
            <label for="due">Due Date <span class="muted">*</span></label>
            <input id="due" name="due" type="date" required>
          </div>
          <div class="field">
            <label for="priority">Priority</label>
            <select id="priority" name="priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="field full">
            <label for="desc">Description</label>
            <textarea id="desc" name="desc" placeholder="Add any details, context or acceptance criteria…"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn" type="submit">✓ Create Task</button>
          <a class="btn secondary" href="task-list.html">Cancel</a>
        </div>
      </form>
    </div>
  </div>

  <footer>Built with TaskFlow • <a href="about.html">About</a></footer>

  <script src="app.js"></script>
  <script>
    (function () {
      const { Store, toast } = window.TaskFlow;
      const form = document.getElementById("task-form");
      form.addEventListener("submit", e => {
        e.preventDefault();
        const title = form.title.value.trim();
        const due = form.due.value;
        if (!title) { toast("Please enter a title"); form.title.focus(); return; }
        if (!due)   { toast("Please pick a due date"); form.due.focus(); return; }
        Store.add({ title, due, priority: form.priority.value, status: "pending", desc: form.desc.value.trim() });
        toast("Task created 🎉");
        setTimeout(() => location.href = "task-list.html", 700);
      });
    })();
  </script>
</body>
</html>
