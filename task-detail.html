<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View full details of a TaskFlow task.">
  <title>TaskFlow — Task Detail</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="index.html"><span class="logo">✓</span> Task<span><b>Flow</b></span></a>
    <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="task-list.html">Tasks</a>
      <a href="add-task.html">Add Task</a>
      <a href="about.html">About</a>
      <button class="theme-toggle" aria-label="Toggle theme">🌙</button>
    </div>
  </nav>

  <div class="container" id="content"><!-- injected --></div>

  <footer>Built with TaskFlow • <a href="about.html">About</a></footer>

  <script src="app.js"></script>
  <script>
    (function () {
      const { Store, toast, fmtDate, cap, param } = window.TaskFlow;
      const id = param("id");
      const t = id ? Store.get(id) : null;
      const root = document.getElementById("content");

      if (!t) {
        root.innerHTML = `<div class="card empty"><div class="big">🔍</div>
          <p>Task not found.</p><br><a class="btn" href="task-list.html">← Back to tasks</a></div>`;
        return;
      }

      const done = t.status === "completed";
      const pct = done ? 100 : (t.priority === "high" ? 35 : t.priority === "medium" ? 55 : 70);

      root.innerHTML = `
        <div class="page-head">
          <div class="eyebrow"><a href="task-list.html" style="color:inherit;text-decoration:none">Tasks</a> / Detail</div>
          <h1>${t.title}</h1>
          <p>
            <span class="badge ${t.status}">${cap(t.status)}</span>
            <span class="badge ${t.priority}">${cap(t.priority)} priority</span>
          </p>
        </div>

        <div class="detail-grid">
          <div class="card">
            <h2 class="section-title">Description</h2>
            <p style="color:var(--text-soft)">${t.desc || "No description provided."}</p>

            <h2 class="section-title" style="margin-top:26px">Progress</h2>
            <div class="progress"><i style="width:${pct}%"></i></div>
            <p class="muted" style="margin-top:8px;font-size:13px">${pct}% complete</p>

            <h2 class="section-title" style="margin-top:26px">Activity</h2>
            <ul class="timeline">
              <li><div class="t">Task created</div><div class="d">Added to the workspace</div></li>
              <li><div class="t">Priority set to ${cap(t.priority)}</div><div class="d">Used for sorting & dashboards</div></li>
              <li><div class="t">${done ? "Marked completed ✅" : "Currently in progress"}</div><div class="d">Due ${fmtDate(t.due)}</div></li>
            </ul>
          </div>

          <div class="card">
            <h2 class="section-title">Details</h2>
            <ul class="meta-list">
              <li><span class="k">Status</span><span class="badge ${t.status}">${cap(t.status)}</span></li>
              <li><span class="k">Priority</span><span class="badge ${t.priority}">${cap(t.priority)}</span></li>
              <li><span class="k">Due date</span><span>${fmtDate(t.due)}</span></li>
              <li><span class="k">Task ID</span><span class="muted">#${t.id}</span></li>
            </ul>
            <div class="form-actions" style="flex-direction:column;align-items:stretch">
              <button class="btn" id="toggle">${done ? "Reopen task" : "Mark as completed"}</button>
              <a class="btn secondary" href="task-list.html">← Back to list</a>
              <button class="btn danger" id="del">Delete task</button>
            </div>
          </div>
        </div>`;

      document.getElementById("toggle").addEventListener("click", () => {
        Store.update(t.id, { status: done ? "pending" : "completed" });
        toast(done ? "Task reopened" : "Task completed ✅");
        setTimeout(() => location.reload(), 600);
      });
      document.getElementById("del").addEventListener("click", () => {
        Store.remove(t.id); toast("Task deleted");
        setTimeout(() => location.href = "task-list.html", 600);
      });
    })();
  </script>
</body>
</html>
